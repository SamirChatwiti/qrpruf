<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390px, initial-scale=1.0">
  <title>QRpruf - Badge Généré</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #fff;
      width: 390px;
      min-height: 844px;
    }
    .status-bar {
      background: #4CC0C0;
      color: white;
      padding: 10px 20px 6px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-family: sans-serif;
    }
    .header {
      background: linear-gradient(160deg, #4CC0C0 60%, #3AADAD 100%);
      padding: 16px 20px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-text {
      color: white;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
    }
    .content {
      padding: 24px 20px 100px;
      background: white;
    }
    .success-box {
      background: #F0FDF4;
      border: 1.5px solid #86EFAC;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 24px;
    }
    .check-icon {
      width: 34px;
      height: 34px;
      background: #22C55E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }
    .success-text {
      font-size: 13.5px;
      color: #166534;
      line-height: 1.7;
      padding-top: 2px;
    }
    .location-pill {
      background: #F5F5F5;
      border-radius: 30px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin: 0 auto 28px;
    }
    .location-pill span {
      font-size: 13px;
      color: #555;
      direction: ltr;
      font-family: monospace;
      letter-spacing: 0.3px;
    }
    .pin-icon { font-size: 17px; }
    .qr-card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    #qrcode canvas, #qrcode img {
      width: 220px !important;
      height: 220px !important;
    }
    .qr-url {
      font-size: 9.5px;
      color: #AAAAAA;
      text-align: center;
      word-break: break-all;
      direction: ltr;
      padding: 0 4px;
      margin-bottom: 32px;
      font-family: monospace;
    }
    .btn-main {
      background: #4CC0C0;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 17px;
      width: 100%;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 390px;
      background: white;
      border-top: 1px solid #F0F0F0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 16px;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: #999;
    }
    .nav-item.active { color: #4CC0C0; }
    .nav-icon { font-size: 22px; }
    .nav-center {
      width: 52px;
      height: 52px;
      background: #4CC0C0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      margin-top: -26px;
      box-shadow: 0 4px 12px rgba(76,192,192,0.4);
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <span>10:30</span>
    <span>WiFi ▪ 84%</span>
  </div>

  <div class="header">
    <div class="header-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="9" height="9" rx="1.5" stroke="white" stroke-width="2"/>
        <rect x="13" y="2" width="9" height="9" rx="1.5" stroke="white" stroke-width="2"/>
        <rect x="2" y="13" width="9" height="9" rx="1.5" stroke="white" stroke-width="2"/>
        <rect x="14.5" y="14.5" width="2" height="2" fill="white"/>
        <rect x="18.5" y="14.5" width="2" height="2" fill="white"/>
        <rect x="14.5" y="18.5" width="2" height="2" fill="white"/>
        <rect x="18.5" y="18.5" width="2" height="2" fill="white"/>
        <rect x="16.5" y="16.5" width="2" height="2" fill="white"/>
      </svg>
    </div>
    <div class="header-text">دليلك الرقمي الموثوق أينما كنت</div>
  </div>

  <div class="content">
    <div class="success-box">
      <div class="check-icon">✓</div>
      <div class="success-text">
        تم إصدار التوثيق بنجاح!<br>
        يمكنك إغلاق التطبيق أو العودة للاستمرار.
      </div>
    </div>

    <div class="location-pill">
      <span>33.5897, -7.6116</span>
      <span class="pin-icon">📍</span>
    </div>

    <div class="qr-card">
      <div id="qrcode"></div>
    </div>

    <div class="qr-url">
      https://www.qrpruf.com/p/proof.html?id=DEMO-2026-a3f8b2c1&#8203;&key=QRprufDemoKey2026XYZ
    </div>

    <button class="btn-main">العودة للرئيسية</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <span class="nav-icon">👤</span>
      <span>حسابي</span>
    </div>
    <div class="nav-center">+</div>
    <div class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>الرئيسية</span>
    </div>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://www.qrpruf.com/p/proof.html?id=DEMO-2026-a3f8b2c1&key=QRprufDemoKey2026XYZ",
      width: 220,
      height: 220,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
